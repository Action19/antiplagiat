version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: antiplagiat-db
    environment:
      POSTGRES_DB: antiplagiat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: antiplagiat-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=antiplagiat
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=antiplagiat_super_secret_production_key_2024
      - JWT_EXPIRES_IN=7d
      - MAX_FILE_SIZE=10485760
      - UPLOAD_DIR=./uploads
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: antiplagiat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
