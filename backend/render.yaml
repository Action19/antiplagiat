# Render Blueprint - avtomatik deploy konfiguratsiyasi
services:
  - type: web
    name: antiplagiat-api
    runtime: node
    buildCommand: npm install && npm run migrate
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: DATABASE_URL
        fromDatabase:
          name: antiplagiat-db
          property: connectionString

databases:
  - name: antiplagiat-db
    plan: free
    databaseName: antiplagiat
